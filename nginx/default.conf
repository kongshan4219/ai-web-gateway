# Included by /etc/nginx/nginx.conf inside the http block
# Project-specific configs are dynamically written to /etc/nginx/conf.d/projects/*.conf
# Note: log_format, access_log, sendfile, keepalive_timeout are in nginx:alpine's nginx.conf

tcp_nopush on;
tcp_nodelay on;
types_hash_max_size 2048;

# Upload size limit
client_max_body_size 512m;

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript
           application/xml+rss application/atom+xml image/svg+xml;

# ─── HTTP Server (port 80) ───────────────────────────────────────

server {
    listen 80;
    server_name _;

    # API requests → Go gateway
    location /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Dashboard → Go gateway
    location = / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deploy routes → dynamic (included from projects/*.conf)
    include /etc/nginx/conf.d/projects/*.conf;

    # Fallback: 404
    location / {
        return 404 '{"error":"not found","service":"ai-web-gateway"}\n';
        add_header Content-Type application/json;
    }
}
